<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" width="32" height="32">
  <style>
    .b { fill: #000000; } /* black outline & sunglasses */
    .y { fill: #facc15; } /* bright yellow main body */
    .o { fill: #d97706; } /* shading orange/yellow */
    .r { fill: #dc2626; } /* red beak */
    .w { fill: #ffffff; } /* white highlight */
    .h { fill: #fef08a; } /* top yellow highlight */
  </style>
  
  <!-- Head Outline and Top Cap -->
  <rect x="12" y="3" width="5" height="1" class="b" />
  <rect x="10" y="4" width="2" height="1" class="b" />
  <rect x="12" y="4" width="4" height="1" class="h" />
  <rect x="16" y="4" width="1" height="1" class="b" />
  <rect x="17" y="4" width="1" height="1" class="y" />
  <rect x="18" y="4" width="1" height="1" class="b" />
  
  <!-- Head Fill & Outline -->
  <rect x="10" y="5" width="1" height="1" class="b" />
  <rect x="11" y="5" width="5" height="1" class="y" />
  <rect x="16" y="5" width="1" height="1" class="b" />
  <rect x="17" y="5" width="2" height="1" class="y" />
  <rect x="19" y="5" width="1" height="1" class="b" />
  
  <!-- Sunglasses (White highlights & black lenses) -->
  <rect x="10" y="6" width="1" height="1" class="b" />
  <rect x="11" y="6" width="1" height="1" class="y" />
  <rect x="12" y="6" width="1" height="1" class="b" />
  <rect x="13" y="6" width="1" height="1" class="w" />
  <rect x="14" y="6" width="1" height="1" class="b" />
  <rect x="15" y="6" width="1" height="1" class="y" />
  <rect x="16" y="6" width="1" height="1" class="b" />
  <rect x="17" y="6" width="1" height="1" class="w" />
  <rect x="18" y="6" width="1" height="1" class="b" />
  <rect x="19" y="6" width="1" height="1" class="b" />
  
  <!-- Sunglasses bottom frame and Red Beak top -->
  <rect x="9" y="7" width="1" height="1" class="b" />
  <rect x="10" y="7" width="2" height="1" class="y" />
  <rect x="12" y="7" width="3" height="1" class="b" />
  <rect x="15" y="7" width="3" height="1" class="r" />
  <rect x="18" y="7" width="1" height="1" class="b" />
  
  <!-- Red Beak bottom & Head connection -->
  <rect x="8" y="8" width="1" height="1" class="b" />
  <rect x="9" y="8" width="6" height="1" class="y" />
  <rect x="15" y="8" width="3" height="1" class="r" />
  <rect x="18" y="8" width="1" height="1" class="b" />
  
  <!-- Neck -->
  <rect x="8" y="9" width="1" height="1" class="b" />
  <rect x="9" y="9" width="9" height="1" class="y" />
  <rect x="18" y="9" width="1" height="1" class="b" />
  <rect x="7" y="10" width="1" height="1" class="b" />
  <rect x="8" y="10" width="10" height="1" class="y" />
  <rect x="18" y="10" width="1" height="1" class="b" />
  
  <!-- Upper Body and Wings -->
  <rect x="5" y="11" width="2" height="1" class="b" />
  <rect x="7" y="11" width="11" height="1" class="y" />
  <rect x="18" y="11" width="1" height="1" class="b" />
  
  <!-- Wing stripe (dark outline highlight) -->
  <rect x="4" y="12" width="1" height="1" class="b" />
  <rect x="5" y="12" width="2" height="1" class="y" />
  <rect x="7" y="12" width="3" height="1" class="b" />
  <rect x="10" y="12" width="8" height="1" class="y" />
  <rect x="18" y="12" width="1" height="1" class="b" />
  
  <!-- Mid Body -->
  <rect x="4" y="13" width="1" height="1" class="b" />
  <rect x="5" y="13" width="5" height="1" class="y" />
  <rect x="10" y="13" width="2" height="1" class="b" />
  <rect x="12" y="13" width="6" height="1" class="y" />
  <rect x="18" y="13" width="1" height="1" class="b" />
  
  <!-- Lower Body Shadow shading -->
  <rect x="4" y="14" width="1" height="1" class="b" />
  <rect x="5" y="14" width="13" height="1" class="o" />
  <rect x="18" y="14" width="1" height="1" class="b" />
  <rect x="5" y="15" width="1" height="1" class="b" />
  <rect x="6" y="15" width="11" height="1" class="o" />
  <rect x="17" y="15" width="1" height="1" class="b" />
  
  <!-- Legs / Feet -->
  <rect x="6" y="16" width="3" height="1" class="b" />
  <rect x="13" y="16" width="3" height="1" class="b" />
  <rect x="6" y="17" width="3" height="1" class="b" />
  <rect x="13" y="17" width="3" height="1" class="b" />
</svg>
